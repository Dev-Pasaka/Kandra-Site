name: Build and validate docs site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check-stale-api
      - run: npm run build

  # Deploy is handled by Cloudflare's own Git integration (auto-builds and deploys this repo on
  # every push to main) — not by this workflow. This job exists only to catch content/build
  # errors on PRs and pushes before Cloudflare's own build runs.
